<div id="{{ name }}"
  hx-get="/{{ name }}"
  hx-trigger="every 30m"
  hx-swap="outerHTML">

  <div id="{{ name }}"
    hx-get="/{{ name }}?edit=true"
    hx-trigger="click"
    hx-target="this"
    hx-swap="outerHTML">

    {% if is_list %}
      <ul>
        {% for item in text %}
          <li>{{ item }}</li>
        {% endfor %}
      </ul>
    {% else %}
      {{ text }}
    {% endif %}

  </div>
</div>
